plugins {
    id 'com.android.library'
    id 'maven-publish'
}

def mlkitTranslateVersion = project.findProperty('mlkitTranslateVersion') ?: '17.0.3'
def jsoupVersion = project.findProperty('jsoupVersion') ?: '1.17.2'

android {
    namespace 'io.github.godsarmy.mlhtmltranslator'
    compileSdk 35

    defaultConfig {
        minSdk 24
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        consumerProguardFiles 'consumer-rules.pro'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

dependencies {
    implementation 'androidx.annotation:annotation:1.8.2'
    implementation "org.jsoup:jsoup:${jsoupVersion}"
    implementation "com.google.mlkit:translate:${mlkitTranslateVersion}"

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = (project.findProperty('group') ?: 'com.github.godsarmy').toString()
                artifactId = 'library'
                version = (project.findProperty('version') ?: '0.5.0').toString()
            }
        }
    }
}
