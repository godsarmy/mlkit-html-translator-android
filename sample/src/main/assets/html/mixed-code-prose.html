<h2>Troubleshooting Guide</h2>
<p>If API calls fail, inspect environment variables and retry settings.</p>
<pre><code>curl --retry 3 --max-time 10 https://api.example.com/v1/health</code></pre>
<p>Keep placeholders like <code>${TOKEN}</code> and formatting tokens like <code>%s</code> unchanged.</p>
<p>Reference path: <code>/var/log/service/current.log</code></p>
